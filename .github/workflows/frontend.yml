# ============================================================
# Frontend CI/CD Pipeline (Standalone Repo)
# ============================================================
# This runs every time you push to the job-platform-frontend repo.
# No "paths:" filter needed — the whole repo IS the frontend.
#
# FLOW:
# Push/PR to main → Install deps → Type-check → Build
#                 → Build Docker image → Push to Docker Hub
# ============================================================

name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------
  # JOB 1: Build and Lint
  # ----------------------------------------------------------
  build-and-lint:
    runs-on: ubuntu-latest

    # No working-directory needed — repo root IS the frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # cache-dependency-path is at root now (no subfolder)
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Build
        run: pnpm build

  # ----------------------------------------------------------
  # JOB 2: Build and Push Docker Image
  # ----------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # context is "." — Dockerfile is at the repo root
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            akhrifou/jobmatch-frontend:latest
            akhrifou/jobmatch-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=http://localhost:8080
