server {
    listen 80;
    server_name localhost;

    # Where the built React files live
    root /usr/share/nginx/html;
    index index.html;

    # Handle SPA routing:
    # 1. Try to serve the exact file requested (e.g. /assets/main.js)
    # 2. Try as a directory
    # 3. If nothing matches, serve index.html (React Router takes over)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container.
    # Any request starting with /api/ gets forwarded to the backend.
    # Example: frontend calls /api/jobs → Nginx sends it to backend:8080/api/jobs
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets (JS, CSS, images) for 1 year.
    # Vite adds unique hashes to filenames, so when code changes,
    # the filename changes and the browser fetches the new version.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
